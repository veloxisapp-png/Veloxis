<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloxis — نبض السوق</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05070a; --card: #0f172a; --accent: #3b82f6;
      --pos: #10b981; --neg: #ef4444; --text: #f8fafc;
    }
    body {
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 100%);
      color: var(--text); font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
    }
    .gauge-needle {
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: 250px 250px;
    }
    .mini-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
  </style>
</head>
<body class="p-4 md:p-8">

  <header class="max-w-7xl mx-auto flex justify-between items-center mb-10">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-xl">V</div>
      <h1 class="text-xl font-bold tracking-tight uppercase">Veloxis</h1>
    </div>
    <nav class="hidden md:flex gap-6 text-sm text-slate-400">
      <a href="#" class="text-blue-400">نبض السوق</a>
      <a href="#" class="hover:text-white">التحليلات</a>
      <a href="#" class="hover:text-white">المختبر</a>
    </nav>
    <div id="live-clock" class="text-xs font-mono text-slate-500">جارِ التحميل...</div>
  </header>

  <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <div class="lg:col-span-4 space-y-6">
      <div class="glass-card p-6">
        <h3 class="text-slate-400 text-sm mb-1">حالة المخاطر</h3>
        <div id="risk-tone" class="text-3xl font-bold mb-4">-</div>
        <div class="space-y-3">
          <div class="flex justify-between text-sm"><span class="text-slate-500">القوة الدافعة</span> <span id="main-driver" class="font-medium">--</span></div>
          <div class="flex justify-between text-sm"><span class="text-slate-500">عوامل التوازن</span> <span id="offset-driver" class="font-medium">--</span></div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="glass-card p-4 text-center">
          <div class="text-xs text-slate-500 mb-1">NASDAQ</div>
          <div class="font-bold text-emerald-400">+0.52%</div>
        </div>
        <div class="glass-card p-4 text-center">
          <div class="text-xs text-slate-500 mb-1">VIX</div>
          <div class="font-bold text-rose-400">18.4</div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-8 glass-card p-8 flex flex-col items-center justify-center relative overflow-hidden">
      <div class="absolute top-6 left-6 flex items-center gap-2">
        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
        <span class="text-xs text-slate-400 uppercase tracking-widest">Live Engine</span>
      </div>

      <svg viewBox="0 0 500 300" class="w-full max-w-md">
        <path d="M 100 250 A 150 150 0 0 1 400 250" fill="none" stroke="#1e293b" stroke-width="25" stroke-linecap="round"/>
        <path id="gauge-path" d="M 100 250 A 150 150 0 0 1 400 250" fill="none" stroke="url(#gradient)" stroke-width="25" stroke-linecap="round" stroke-dasharray="471" stroke-dashoffset="471"/>
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ef4444" />
            <stop offset="50%" stop-color="#eab308" />
            <stop offset="100%" stop-color="#10b981" />
          </linearGradient>
        </defs>
        <g id="needle" class="gauge-needle">
          <rect x="248" y="110" width="4" height="140" fill="white" rx="2" />
          <circle cx="250" cy="250" r="10" fill="white" />
        </g>
      </svg>
      
      <div class="text-center -mt-10">
        <div id="gauge-value" class="text-6xl font-black italic">0</div>
        <div class="text-slate-500 text-sm uppercase tracking-widest mt-2">Sentiment Score</div>
      </div>
    </div>

    <div class="lg:col-span-12">
      <h3 class="text-lg font-bold mb-4 px-2">محركات السوق الأساسية</h3>
      <div id="drivers-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        </div>
    </div>
  </main>

  <script>
    const marketData = [
      { name: "الدولار", val: "104.2", chg: -0.15, weight: 30, impact: "ايجابي للأسهم" },
      { name: "عائد السندات", val: "4.25%", chg: 0.05, weight: 25, impact: "ضغط طفيف" },
      { name: "الذهب", val: "$2340", chg: 1.2, weight: 20, impact: "طلب دفاعي" },
      { name: "البيتكوين", val: "$67k", chg: 2.5, weight: 25, impact: "شهية مخاطرة" }
    ];

    function updateDashboard() {
      const driversContainer = document.getElementById('drivers-list');
      let totalScore = 0;

      driversContainer.innerHTML = marketData.map(item => {
        const isPos = item.chg > 0;
        totalScore += isPos ? item.weight : 0;
        return `
          <div class="glass-card p-5 border-l-4 ${isPos ? 'border-emerald-500' : 'border-rose-500'}">
            <div class="flex justify-between mb-2">
              <span class="text-slate-400 text-sm">${item.name}</span>
              <span class="${isPos ? 'text-emerald-400' : 'text-rose-400'} text-xs font-bold">${isPos?'+':''}${item.chg}%</span>
            </div>
            <div class="text-xl font-bold mb-1">${item.val}</div>
            <div class="mini-bar"><div class="h-full ${isPos?'bg-emerald-500':'bg-rose-500'}" style="width:${item.weight}%"></div></div>
          </div>
        `;
      }).join('');

      // Update Gauge
      const score = Math.round(totalScore);
      document.getElementById('gauge-value').innerText = score;
      const angle = (score / 100) * 180 - 90;
      document.getElementById('needle').style.transform = `rotate(${angle}deg)`;
      
      // Update Summary
      document.getElementById('risk-tone').innerText = score > 50 ? "متفائل (Risk-On)" : "حذر (Risk-Off)";
      document.getElementById('main-driver').innerText = marketData[3].name;
      document.getElementById('offset-driver').innerText = marketData[1].name;
      
      // Clock
      document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
    }

    updateDashboard();
    setInterval(updateDashboard, 5000);
  </script>
</body>
</html>
